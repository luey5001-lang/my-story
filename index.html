<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도형의 MUD 대장간: 리스크 앤 리턴</title>
    <style>
        body {
            background-color: #0c0d0e;
            color: #d1d5db;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            width: 700px;
            background-color: #1a1c1e;
            border: 2px solid #3f444a;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 8px;
        }
        h2 { text-align: center; color: #e5e7eb; border-bottom: 2px solid #3f444a; padding-bottom: 10px; margin-top: 0; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            background-color: #111214;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }
        .dashboard-col div { margin-bottom: 5px; }
        
        .log-window {
            height: 380px;
            border: 1px solid #3f444a;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            background-color: #090a0b;
            white-space: pre-line;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
        }
        button {
            background-color: #24272b;
            color: #e5e7eb;
            border: 1px solid #4b525a;
            padding: 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background-color: #3b3f46; border-color: #6b7280; }
        button:disabled { color: #4b525a; border-color: #2d3135; cursor: not-allowed; background-color: #17191c; }
        #btn-craft { background-color: #851c1d; border-color: #a8292b; color: #fff; }
        #btn-craft:hover { background-color: #a8292b; }

        /* 상태별 텍스트 색상 스키마 */
        .rank-normal { color: #9ca3af; }
        .rank-rare { color: #3b82f6; font-weight: bold; }
        .rank-ancient { color: #a855f7; font-weight: bold; }
        .rank-mythic { color: #ef4444; font-weight: bold; text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
        
        .sys-gold { color: #f59e0b; font-weight: bold; }
        .profit { color: #10b981; font-weight: bold; } /* 이득: 초록 */
        .loss { color: #ef4444; font-weight: bold; }   /* 손해: 빨강 */
    </style>
</head>
<body>

<div class="game-container">
    <h2>[ ⚒️ MUD 대장간: 하이 리스크 하이 리턴 ]</h2>
    
    <div class="dashboard">
        <div class="dashboard-col">
            <div><strong>[장인 정보]</strong> 명장 Dohyong</div>
            <div><strong>[보유 자산]</strong> <span id="txt-gold" class="sys-gold">2,000 G</span></div>
        </div>
        <div class="dashboard-col">
            <div><strong>[확정 제작 비용]</strong></div>
            <div>💰 무기 제련 단가: <span class="sys-gold">300 G</span> 고정 소모</div>
        </div>
    </div>

    <div class="log-window" id="log-screen">
대장간의 불길이 거세게 타오릅니다.
[제련 개시] 버튼을 누르면 조건 없이 즉시 <span class="sys-gold">300 골드</span>가 차감됩니다.

제작 완료된 장비의 가치가 <span class="sys-gold">300 G</span>보다 낮으면 <b>적자(손해)</b>를 보며,
옵션이 잘 붙어 <span class="sys-gold">300 G</span>를 초과하면 <b>흑자(이득)</b>를 봅니다.
당신의 행운을 테스트해 보세요.
    </div>

    <div class="controls">
        <button id="btn-craft">⚒️ 무기 제련하기 (-300G)</button>
        <button id="btn-clear">🧹 로그 청소</button>
    </div>
</div>

<script>
    const logScreen = document.getElementById('log-screen');
    const txtGold = document.getElementById('txt-gold');
    const btnCraft = document.getElementById('btn-craft');

    let gold = 2000;
    const CRAFT_COST = 300; // 고정 제작 비용 명시

    const baseWeapons = [
        { name: "녹슨 단검", atkMin: 5, atkMax: 12, valBase: 30 },
        { name: "수련용 장검", atkMin: 15, atkMax: 25, valBase: 100 },
        { name: "철제 배틀액스", atkMin: 25, atkMax: 45, valBase: 180 },
        { name: "기사의 강철창", atkMin: 35, atkMax: 55, valBase: 250 }
    ];

    const prefixes = [
        { text: "부서진", atkMod: 0.5, valMod: 0.3, rank: "normal" },      // 제작비 미달 유도용
        { text: "이 빠진", atkMod: 0.7, valMod: 0.5, rank: "normal" },      // 제작비 미달 유도용
        { text: "일반적인", atkMod: 1.0, valMod: 1.0, rank: "normal" },    // 본전 내외
        { text: "균형 잡힌", atkMod: 1.2, valMod: 1.4, rank: "rare" },      // 약간의 이득
        { text: "날카로운", atkMod: 1.4, valMod: 1.8, rank: "rare" },       // 이득
        { text: "불타는 고대의", atkMod: 2.0, valMod: 3.5, rank: "ancient" }, // 대박 (1000G 이상)
        { text: "⚡ 신화 속 천벌의", atkMod: 4.0, valMod: 10.0, rank: "mythic" } // 초대박 (2500G 이상)
    ];

    function printHtmlLog(htmlText) {
        logScreen.innerHTML += "\n" + htmlText;
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    // 4. 고정밀 손익 계산 및 제련 시스템
    btnCraft.addEventListener('click', () => {
        if (gold < CRAFT_COST) {
            printHtmlLog("❌ 제련 실패: 자금이 부족합니다. (최소 300G 필요)");
            return;
        }

        // 1. 선 차감: 제련 시작 시 비용 즉시 지출
        gold -= CRAFT_COST;
        txtGold.innerText = `${gold.toLocaleString()} G`;
        btnCraft.disabled = true;

        printHtmlLog(`\n------------------------------------------------------------`);
        printHtmlLog(`🔨 모루 위에 300G 상당의 원자재를 붓고 제련을 시작합니다... (망치질 중)`);
        
        setTimeout(() => {
            // A. 베이스 무기 무작위 선정
            const base = baseWeapons[Math.floor(Math.random() * baseWeapons.length)];
            
            // B. 등급 확률 계산 (접두사 매칭)
            const roll = Math.random();
            let selectedPrefix;
            
            if (roll < 0.03) selectedPrefix = prefixes.find(p => p.rank === "mythic");       // 3% 확률 신화
            else if (roll < 0.12) selectedPrefix = prefixes.find(p => p.rank === "ancient");  // 9% 확률 고대
            else if (roll < 0.45) selectedPrefix = prefixes[Math.floor(Math.random() * 2) + 3]; // 33% 확률 희귀계열 2개 중 하나
            else selectedPrefix = prefixes[Math.floor(Math.random() * 3)]; // 55% 확률 꽝/일반 계열 3개 중 하나

            // C. 스펙 연산
            const rawAtk = Math.floor(Math.random() * (base.atkMax - base.atkMin + 1)) + base.atkMin;
            const finalAtk = Math.floor(rawAtk * selectedPrefix.atkMod);

            // D. 최종 감정가 정밀 수식
            const itemValue = Math.floor(base.valBase * selectedPrefix.valMod);

            // E. 손익(수익률) 정밀 계산 규칙
            const netProfit = itemValue - CRAFT_COST; // 최종가 - 제작비(300G)
            
            let rankClass = `rank-${selectedPrefix.rank}`;
            let resultMessage = "";

            if (netProfit > 0) {
                // 흑자 발생 시 연출
                resultMessage = `<span class="profit">📈 [흑자 발생] 제작비 대비 +${netProfit.toLocaleString()} G 이득!</span>`;
            } else if (netProfit < 0) {
                // 적자 발생 시 연출
                resultMessage = `<span class="loss">📉 [적자 발생] 제작비 대비 ${netProfit.toLocaleString()} G 손해...</span>`;
            } else {
                resultMessage = `<span>⚖️ [본전 판정] 본전을 건졌습니다.</span>`;
            }

            // F. 출력 화면 구성
            const fullName = `${selectedPrefix.text} ${base.name}`;
            printHtmlLog(`⚔️ 제련 완료: <span class="${rankClass}">[${fullName}]</span>`);
            printHtmlLog(`   · 최종 공격력: ${finalAtk} P (기본 무기 공격력: ${rawAtk})`);
            printHtmlLog(`   · 아이템 감정가: <span class="sys-gold">${itemValue.toLocaleString()} G</span>`);
            printHtmlLog(`   · 투자 손익 결과: ${resultMessage}`);

            // 장비를 즉시 판매 처리하여 소지 골드 회수 업데이트
            gold += itemValue;
            txtGold.innerText = `${gold.toLocaleString()} G`;
            
            btnCraft.disabled = false;
        }, 800);
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        logScreen.innerText = "대장간 바닥의 잿더미를 치웠습니다.";
    });
</script>

</body>
</html>

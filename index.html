<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가챠 시뮬레이터: 영웅 소환</title>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }
        .gacha-container {
            width: 800px;
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h2 { text-align: center; color: #fbbf24; margin-top: 0; border-bottom: 2px solid #334155; padding-bottom: 15px; letter-spacing: 2px; }
        
        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        .gem-text { color: #38bdf8; }

        /* 가챠 버튼 영역 */
        .summon-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn-summon {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            font-family: inherit;
        }
        .btn-summon:active { transform: scale(0.98); }
        .btn-summon:disabled { filter: grayscale(1); cursor: not-allowed; }
        
        #btn-single { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        #btn-multi { background: linear-gradient(135deg, #d946ef, #9333ea); color: white; box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4); }

        /* 결과 화면 렌더링 영역 (10연뽑 지원 그리드) */
        .result-stage {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            min-height: 250px;
            background-color: #0b1120;
            padding: 20px;
            border-radius: 8px;
            border: 1px inset #334155;
            align-content: center;
        }

        /* 개별 소환 유닛 카드 스타일 */
        .gacha-card {
            background-color: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px 5px;
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.4s forwards;
            text-align: center;
        }
        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-rank { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .card-name { font-size: 14px; word-break: keep-all; }

        /* 등급별 색상 (CSS 클래스) */
        .rank-R { border-color: #94a3b8; box-shadow: inset 0 0 10px rgba(148, 163, 184, 0.2); }
        .rank-R .card-rank { color: #94a3b8; }
        
        .rank-SR { border-color: #a855f7; box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.4), 0 0 10px rgba(168, 85, 247, 0.5); }
        .rank-SR .card-rank { color: #c084fc; text-shadow: 0 0 5px #c084fc; }
        
        .rank-SSR { 
            border-color: #fbbf24; 
            box-shadow: inset 0 0 20px rgba(251, 191, 36, 0.5), 0 0 15px rgba(251, 191, 36, 0.8); 
            background: linear-gradient(135deg, #451a03, #1e293b);
        }
        .rank-SSR .card-rank { color: #fbbf24; text-shadow: 0 0 10px #fbbf24, 0 0 20px #fbbf24; }

        .log-window { margin-top: 15px; font-size: 13px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="gacha-container">
    <h2>✨ GRAND HERO SUMMON ✨</h2>
    
    <div class="dashboard">
        <div>보유 크리스탈: <span class="gem-text" id="txt-gems">3,000 💎</span></div>
        <div style="font-size: 13px; color: #64748b;">[확률] SSR: 3% | SR: 17% | R: 80%</div>
    </div>

    <div class="summon-controls">
        <button class="btn-summon" id="btn-single">1회 소환 (-100 💎)</button>
        <button class="btn-summon" id="btn-multi">10회 연속 소환 (-1,000 💎)</button>
    </div>

    <div class="result-stage" id="result-stage">
        <!-- 가챠 결과 카드가 자바스크립트에 의해 이곳에 주입됩니다 -->
    </div>

    <div class="log-window" id="log-screen">
        크리스탈을 소모하여 영웅을 소환하십시오.
    </div>
</div>

<script>
    let gems = 3000;
    
    // 1. 가챠 확률 풀 (데이터베이스)
    // chance의 총합은 반드시 1.0(100%)이어야 합니다.
    const gachaPool = [
        // SSR 등급 (총 3%)
        { name: "빛의 성기사 아서", rank: "SSR", chance: 0.01 },
        { name: "타락한 대마법사", rank: "SSR", chance: 0.01 },
        { name: "전설의 드래곤", rank: "SSR", chance: 0.01 },
        
        // SR 등급 (총 17%)
        { name: "엘프 저격수", rank: "SR", chance: 0.05 },
        { name: "강철 기갑병", rank: "SR", chance: 0.06 },
        { name: "암흑 암살자", rank: "SR", chance: 0.06 },

        // R 등급 (총 80%)
        { name: "마을 경비병", rank: "R", chance: 0.25 },
        { name: "떠돌이 용병", rank: "R", chance: 0.25 },
        { name: "초보 마법사", rank: "R", chance: 0.30 }
    ];

    const txtGems = document.getElementById('txt-gems');
    const resultStage = document.getElementById('result-stage');
    const logScreen = document.getElementById('log-screen');
    const btnSingle = document.getElementById('btn-single');
    const btnMulti = document.getElementById('btn-multi');

    function updateUI() {
        txtGems.innerText = `${gems.toLocaleString()} 💎`;
    }

    // 2. 가챠 알고리즘 엔진 (누적 확률 검사)
    function pullGacha() {
        const rand = Math.random(); // 0.0000 ~ 0.9999 난수 생성
        let cumulative = 0;

        for (let i = 0; i < gachaPool.length; i++) {
            cumulative += gachaPool[i].chance;
            if (rand <= cumulative) {
                return gachaPool[i]; // 난수가 누적 확률 범위에 들어가면 해당 아이템 반환
            }
        }
        return gachaPool[gachaPool.length - 1]; // 오차 보정용 기본값
    }

    // 3. 카드 시각화 (DOM 생성)
    function renderCard(item, delayIndex) {
        const card = document.createElement('div');
        card.className = `gacha-card rank-${item.rank}`;
        // 애니메이션 딜레이를 주어 10연뽑 시 카드가 순차적으로 나타나도록 처리
        card.style.animationDelay = `${delayIndex * 0.1}s`; 

        card.innerHTML = `
            <div class="card-rank">${item.rank}</div>
            <div class="card-name">${item.name}</div>
        `;
        resultStage.appendChild(card);
    }

    // 4. 소환 실행 로직
    function executeSummon(times) {
        const cost = times * 100;
        
        if (gems < cost) {
            logScreen.innerHTML = "<span style='color: #ef4444;'>❌ 크리스탈이 부족합니다.</span>";
            return;
        }

        // 재화 차감 및 UI 초기화
        gems -= cost;
        updateUI();
        resultStage.innerHTML = '';
        btnSingle.disabled = true;
        btnMulti.disabled = true;
        logScreen.innerText = `소환 의식을 진행 중입니다...`;

        let ssrCount = 0;

        // 지정된 횟수만큼 가챠 엔진 반복 실행
        for (let i = 0; i < times; i++) {
            const pulledItem = pullGacha();
            if (pulledItem.rank === "SSR") ssrCount++;
            
            renderCard(pulledItem, i);
        }

        // 모든 카드가 나타난 후 처리될 로직
        setTimeout(() => {
            if (ssrCount > 0) {
                logScreen.innerHTML = `<span style='color: #fbbf24;'>🎉 경사입니다! 최고 등급(SSR)이 ${ssrCount}장 출현했습니다!</span>`;
            } else {
                logScreen.innerHTML = `소환이 완료되었습니다.`;
            }
            btnSingle.disabled = false;
            btnMulti.disabled = false;
        }, (times * 100) + 400); // 딜레이 시간 계산 후 버튼 활성화
    }

    // 이벤트 리스너
    btnSingle.addEventListener('click', () => executeSummon(1));
    btnMulti.addEventListener('click', () => executeSummon(10));
</script>

</body>
</html>

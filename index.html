<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형의 프로젝트: HACK_MAN</title>
    <style>
        body {
            background-color: #050505;
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            width: 90%;
            max-width: 600px;
            background-color: #000;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            padding: 20px;
            border-radius: 5px;
            position: relative;
        }
        .terminal::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        h2 { border-bottom: 1px dashed #0f0; padding-bottom: 10px; margin-top: 0; text-shadow: 0 0 5px #0f0; }
        
        .status-panel { margin-bottom: 20px; font-size: 14px; }
        .trace-bar-container { width: 100%; background-color: #111; border: 1px solid #0f0; height: 20px; margin-top: 5px; position: relative; }
        .trace-bar { height: 100%; background-color: #0f0; width: 0%; transition: width 0.3s; }
        .trace-text { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-weight: bold; color: #fff; mix-blend-mode: difference; line-height: 20px; }
        .warning { color: #f00; text-shadow: 0 0 5px #f00; }
        .warning .trace-bar { background-color: #f00; }
        .warning .trace-bar-container { border-color: #f00; }

        .word-display { font-size: 32px; letter-spacing: 10px; text-align: center; margin: 30px 0; text-shadow: 0 0 8px #0f0; }
        .used-letters { margin-bottom: 20px; font-size: 14px; color: #aaa; }
        
        .input-area { display: flex; align-items: center; gap: 10px; border-top: 1px dashed #0f0; padding-top: 15px; }
        .prompt { font-weight: bold; }
        input[type="text"] {
            background: transparent; border: none; border-bottom: 2px solid #0f0; color: #0f0;
            font-family: inherit; font-size: 20px; width: 40px; text-align: center; outline: none; text-transform: uppercase; z-index: 5;
        }
        button {
            background-color: #0f0; color: #000; border: none; padding: 8px 15px; font-family: inherit; font-weight: bold; cursor: pointer; z-index: 5;
        }
        button:hover { background-color: #fff; }
        
        .log-screen { margin-top: 15px; height: 100px; overflow-y: auto; font-size: 12px; color: #888; position: relative; z-index: 5; }
        .log-screen span { display: block; margin-bottom: 3px; }

        .overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); z-index: 10; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .overlay h1 { font-size: 40px; margin-bottom: 10px; }
        .word-meaning { color: #fbbf24; font-size: 18px; margin: 15px 0; font-weight: bold; border: 1px dashed #fbbf24; padding: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="overlay" id="end-screen">
        <h1 id="end-title">SYSTEM LOCKDOWN</h1>
        <p id="end-desc">방화벽에 의해 추적당했습니다.</p>
        <!-- 정답 단어의 뜻이 표시되는 영역 -->
        <div class="word-meaning" id="end-meaning">의미: 알 수 없음</div>
        <button onclick="location.reload()">> REBOOT SYSTEM_</button>
    </div>

    <h2>> MAINFRAME_DECRYPTION_PROTOCOL</h2>
    
    <div class="status-panel" id="status-panel">
        <div>> 타겟: 보안 방화벽 루트 패스워드</div>
        <div>> 보안 추적 진행률 (최대 6회 오류 시 시스템 차단)</div>
        <div class="trace-bar-container">
            <div class="trace-bar" id="trace-bar"></div>
            <div class="trace-text" id="trace-text">TRACE: 0%</div>
        </div>
    </div>

    <div class="word-display" id="word-display">_ _ _ _ _ _</div>
    
    <div class="used-letters">> 시도한 알파벳 데이터: <span id="used-letters-text">없음</span></div>

    <div class="input-area">
        <span class="prompt">C:\> DECRYPT -key</span>
        <input type="text" id="letter-input" maxlength="1" autocomplete="off">
        <button id="btn-submit">INJECT</button>
    </div>

    <div class="log-screen" id="log-screen">
        <span>[SYSTEM] 해독 프로토콜이 가동되었습니다.</span>
        <span>[SYSTEM] 무작위 영단어 패스워드를 한 글자씩 추론하십시오.</span>
    </div>
</div>

<script>
    // 1. 단어 + 뜻 사전 구축 (총 100개 엄선 데이터)
    // 형식을 보시면 아시겠지만 { w: "영단어", m: "뜻" } 모양만 맞춰서 무한대로 추가할 수 있습니다.
    const dictionary = [
        { w: "ABANDON", m: "버리다, 포기하다" }, { w: "ABILITY", m: "능력" }, { w: "ABSOLUTE", m: "절대적인" },
        { w: "BALANCE", m: "균형, 잔고" }, { w: "BENEFIT", m: "이익, 혜택" }, { w: "BOUNDARY", m: "경계, 한계" },
        { w: "CABINET", m: "보관장, 내각" }, { w: "CALCULATE", m: "계산하다" }, { w: "CAPACITY", m: "수용력, 용량" },
        { w: "DANGER", m: "위험" }, { w: "DEBATE", m: "토론, 논쟁" }, { w: "DEFEND", m: "방어하다" },
        { w: "ECONOMY", m: "경제" }, { w: "EDITION", m: "판, 발행물" }, { w: "ELEMENT", m: "요소, 성분" },
        { w: "FABRIC", m: "직물, 구조" }, { w: "FACILITY", m: "시설, 설비" }, { w: "FACTOR", m: "요인, 인자" },
        { w: "GALLERY", m: "미술관" }, { w: "GARAGE", m: "차고" }, { w: "GATHER", m: "모이다, 수집하다" },
        { w: "HABIT", m: "습관" }, { w: "HANDLE", m: "다루다, 처리하다" }, { w: "HARVEST", m: "수확하다" },
        { w: "IGNORE", m: "무시하다" }, { w: "ILLUSION", m: "환상, 착각" }, { w: "IMPACT", m: "충격, 영향" },
        { w: "JOURNAL", m: "일기, 학술지" }, { w: "JUSTICE", m: "정의, 공정" }, { w: "JUSTIFY", m: "정당화하다" },
        { w: "KNOWLEDGE", m: "지식" }, { w: "KEYBOARD", m: "키보드, 건반" }, { w: "KINETIC", m: "운동의, 동역학의" },
        { w: "LABOR", m: "노동, 근로" }, { w: "LANGUAGE", m: "언어" }, { w: "LEGACY", m: "유산" },
        { w: "MACHINE", m: "기계" }, { w: "MAGNET", m: "자석" }, { w: "MAINTAIN", m: "유지하다" },
        { w: "NATION", m: "국가" }, { w: "NATIVE", m: "원주민의, 타고난" }, { w: "NATURE", m: "자연, 본성" },
        { w: "OBJECT", m: "물체, 목표" }, { w: "OBSERVE", m: "관찰하다" }, { w: "OBTAIN", m: "얻다, 획득하다" },
        { w: "PACKAGE", m: "꾸러미, 포장" }, { w: "PALACE", m: "궁전" }, { w: "PASSION", m: "열정" },
        { w: "QUALITY", m: "품질, 질" }, { w: "QUANTITY", m: "양, 수량" }, { w: "QUARTER", m: "4분의 1, 분기" },
        { w: "RADICAL", m: "급진적인" }, { w: "RANDOM", m: "무작위의" }, { w: "REACTION", m: "반응" },
        { w: "SACRIFICE", m: "희생하다" }, { w: "SAFETY", m: "안전" }, { w: "SAMPLE", m: "견본, 표본" },
        { w: "TARGET", m: "목표, 표적" }, { w: "TECHNIC", m: "기술, 기법" }, { w: "TEMPLE", m: "사원, 신전" },
        { w: "ULTIMATE", m: "궁극적인, 최후의" }, { w: "UMBRELLA", m: "우산" }, { w: "UNIVERSE", m: "우주" },
        { w: "VACATION", m: "휴가" }, { w: "VALLEY", m: "계곡" }, { w: "VALUABLE", m: "가치 있는" },
        { w: "WANDER", m: "헤매다, 배회하다" }, { w: "WARNING", m: "경고" }, { w: "WEALTH", m: "부, 재산" },
        { w: "YIELD", m: "양보하다, 산출하다" }, { w: "YOUTH", m: "젊음, 청년기" },
        // IT & 해킹 관련 필수 단어
        { w: "FIREWALL", m: "방화벽" }, { w: "ENCRYPT", m: "암호화하다" }, { w: "HACKER", m: "해커" }, 
        { w: "SYSTEM", m: "체계, 시스템" }, { w: "NETWORK", m: "네트워크, 통신망" }, { w: "MALWARE", m: "악성 소프트웨어" }, 
        { w: "PROTOCOL", m: "통신 규약, 프로토콜" }, { w: "OVERRIDE", m: "기각하다, 무효화하다" }, { w: "SECURITY", m: "보안" }
    ];
    
    // 무작위로 데이터 뽑기
    const selectedData = dictionary[Math.floor(Math.random() * dictionary.length)];
    const targetWord = selectedData.w;
    const targetMeaning = selectedData.m;
    
    // 게임 장부
    let guessedLetters = [];
    let mistakes = 0;
    const MAX_MISTAKES = 6;

    // DOM 연결
    const wordDisplay = document.getElementById('word-display');
    const usedLettersText = document.getElementById('used-letters-text');
    const traceBar = document.getElementById('trace-bar');
    const traceText = document.getElementById('trace-text');
    const statusPanel = document.getElementById('status-panel');
    const letterInput = document.getElementById('letter-input');
    const btnSubmit = document.getElementById('btn-submit');
    const logScreen = document.getElementById('log-screen');
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const endDesc = document.getElementById('end-desc');
    const endMeaning = document.getElementById('end-meaning');

    function updateWordDisplay() {
        let displayStr = "";
        let isWin = true;

        for (let i = 0; i < targetWord.length; i++) {
            const char = targetWord[i];
            if (guessedLetters.includes(char)) {
                displayStr += char + " ";
            } else {
                displayStr += "_ ";
                isWin = false; 
            }
        }
        wordDisplay.innerText = displayStr.trim();
        return isWin;
    }

    function printLog(msg, isError = false) {
        const span = document.createElement('span');
        span.innerText = msg;
        if (isError) span.style.color = "#f00";
        else span.style.color = "#0f0";
        
        logScreen.appendChild(span);
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    function updateTraceStatus() {
        const tracePercent = Math.floor((mistakes / MAX_MISTAKES) * 100);
        traceBar.style.width = `${tracePercent}%`;
        traceText.innerText = `TRACE: ${tracePercent}%`;

        if (mistakes >= 4) {
            statusPanel.classList.add('warning');
        }
    }

    // 게임 오버 처리 및 단어 의미 출력
    function gameOver(isWin) {
        endScreen.style.display = "flex";
        
        // 정답 단어와 그 의미를 표시
        endMeaning.innerText = `[ ${targetWord} ] : ${targetMeaning}`;

        if (isWin) {
            endTitle.innerText = "ACCESS GRANTED";
            endTitle.style.color = "#0f0";
            endDesc.innerText = `패스워드 해독에 성공했습니다.\n방화벽을 무력화하고 탈출했습니다.`;
        } else {
            endTitle.innerText = "SYSTEM LOCKDOWN";
            endTitle.style.color = "#f00";
            endDesc.innerText = `보안 시스템에 의해 강제 종료되었습니다.\n비밀번호를 해독하지 못했습니다.`;
        }
    }

    function handleGuess() {
        const guess = letterInput.value.toUpperCase();
        letterInput.value = "";
        letterInput.focus();

        if (!guess.match(/[A-Z]/)) {
            printLog("[WARN] 잘못된 입력입니다. 영문 알파벳만 입력하십시오.", true);
            return;
        }

        if (guessedLetters.includes(guess)) {
            printLog(`[WARN] '${guess}'는 이미 테스트한 데이터입니다.`, true);
            return;
        }

        guessedLetters.push(guess);
        usedLettersText.innerText = guessedLetters.join(", ");

        if (targetWord.includes(guess)) {
            printLog(`[SUCCESS] 데이터 '${guess}' 일치. 암호화 노드 해독 중...`);
        } else {
            mistakes++;
            printLog(`[DENIED] 데이터 '${guess}' 불일치. 보안 추적률이 상승합니다!`, true);
            updateTraceStatus();
        }

        const isWin = updateWordDisplay();

        if (isWin) {
            setTimeout(() => gameOver(true), 500);
        } else if (mistakes >= MAX_MISTAKES) {
            setTimeout(() => gameOver(false), 500);
        }
    }

    btnSubmit.addEventListener('click', handleGuess);
    letterInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleGuess();
    });

    updateWordDisplay();
    letterInput.focus();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형의 프로젝트: HACK_MAN</title>
    <style>
        /* 터미널 감성 CSS */
        body {
            background-color: #050505;
            color: #0f0; /* 해커 감성의 형광 녹색 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            width: 90%;
            max-width: 600px;
            background-color: #000;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            padding: 20px;
            border-radius: 5px;
            position: relative;
        }
        /* 옛날 브라운관(CRT) 모니터의 스캔라인 효과 */
        .terminal::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        h2 { border-bottom: 1px dashed #0f0; padding-bottom: 10px; margin-top: 0; text-shadow: 0 0 5px #0f0; }
        
        .status-panel { margin-bottom: 20px; font-size: 14px; }
        .trace-bar-container { width: 100%; background-color: #111; border: 1px solid #0f0; height: 20px; margin-top: 5px; position: relative; }
        .trace-bar { height: 100%; background-color: #0f0; width: 0%; transition: width 0.3s; }
        .trace-text { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-weight: bold; color: #fff; mix-blend-mode: difference; line-height: 20px; }
        .warning { color: #f00; text-shadow: 0 0 5px #f00; }
        .warning .trace-bar { background-color: #f00; }
        .warning .trace-bar-container { border-color: #f00; }

        .word-display { font-size: 32px; letter-spacing: 10px; text-align: center; margin: 30px 0; text-shadow: 0 0 8px #0f0; }
        .used-letters { margin-bottom: 20px; font-size: 14px; color: #aaa; }
        
        .input-area { display: flex; align-items: center; gap: 10px; border-top: 1px dashed #0f0; padding-top: 15px; }
        .prompt { font-weight: bold; }
        input[type="text"] {
            background: transparent; border: none; border-bottom: 2px solid #0f0; color: #0f0;
            font-family: inherit; font-size: 20px; width: 40px; text-align: center; outline: none; text-transform: uppercase;
        }
        button {
            background-color: #0f0; color: #000; border: none; padding: 8px 15px; font-family: inherit; font-weight: bold; cursor: pointer;
        }
        button:hover { background-color: #fff; }
        
        .log-screen { margin-top: 15px; height: 100px; overflow-y: auto; font-size: 12px; color: #888; }
        .log-screen span { display: block; }

        /* 블라인드 레이어 */
        .overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); z-index: 10; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .overlay h1 { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <!-- 결과 레이어 (성공/실패 시 화면을 덮음) -->
    <div class="overlay" id="end-screen">
        <h1 id="end-title">SYSTEM LOCKDOWN</h1>
        <p id="end-desc">방화벽에 의해 추적당했습니다.</p>
        <button onclick="location.reload()">> REBOOT SYSTEM_</button>
    </div>

    <h2>> MAINFRAME_DECRYPTION_PROTOCOL</h2>
    
    <div class="status-panel" id="status-panel">
        <div>> 타겟: 보안 방화벽 루트 패스워드</div>
        <div>> 보안 추적 진행률 (최대 6회 오류 시 시스템 차단)</div>
        <div class="trace-bar-container">
            <div class="trace-bar" id="trace-bar"></div>
            <div class="trace-text" id="trace-text">TRACE: 0%</div>
        </div>
    </div>

    <!-- 행맨 단어가 표시되는 곳 -->
    <div class="word-display" id="word-display">_ _ _ _ _ _</div>
    
    <div class="used-letters">> 시도한 알파벳 데이터: <span id="used-letters-text">없음</span></div>

    <!-- 터미널 입력 창 -->
    <div class="input-area">
        <span class="prompt">C:\> DECRYPT -key</span>
        <input type="text" id="letter-input" maxlength="1" autocomplete="off">
        <button id="btn-submit">INJECT</button>
    </div>

    <div class="log-screen" id="log-screen">
        <span>[SYSTEM] 해독 프로토콜이 가동되었습니다.</span>
        <span>[SYSTEM] 숨겨진 영어 패스워드를 한 글자씩 추론하십시오.</span>
    </div>
</div>

<script>
    // 1. 시스템 데이터 (정답 단어장)
    const wordList = [
        "FIREWALL", "ENCRYPT", "HACKER", "SYSTEM", "NETWORK",
        "MALWARE", "PROTOCOL", "OVERRIDE", "SECURITY", "BASTION"
    ];
    
    // 무작위 단어 선정
    const targetWord = wordList[Math.floor(Math.random() * wordList.length)];
    
    // 게임 장부
    let guessedLetters = []; // 입력한 글자들을 담는 배열
    let mistakes = 0;        // 틀린 횟수 (행맨의 목숨)
    const MAX_MISTAKES = 6;  // 6번 틀리면 게임 오버

    // DOM 요소 연결
    const wordDisplay = document.getElementById('word-display');
    const usedLettersText = document.getElementById('used-letters-text');
    const traceBar = document.getElementById('trace-bar');
    const traceText = document.getElementById('trace-text');
    const statusPanel = document.getElementById('status-panel');
    const letterInput = document.getElementById('letter-input');
    const btnSubmit = document.getElementById('btn-submit');
    const logScreen = document.getElementById('log-screen');
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const endDesc = document.getElementById('end-desc');

    // 2. 단어 렌더링 (맞춘 글자는 보이고, 안 맞춘 글자는 _ 로 표시)
    function updateWordDisplay() {
        let displayStr = "";
        let isWin = true;

        for (let i = 0; i < targetWord.length; i++) {
            const char = targetWord[i];
            if (guessedLetters.includes(char)) {
                displayStr += char + " ";
            } else {
                displayStr += "_ ";
                isWin = false; // 아직 못 맞춘 글자가 있으면 승리가 아님
            }
        }
        
        wordDisplay.innerText = displayStr.trim();
        return isWin;
    }

    function printLog(msg, isError = false) {
        const span = document.createElement('span');
        span.innerText = msg;
        if (isError) span.style.color = "#f00";
        else span.style.color = "#0f0";
        
        logScreen.appendChild(span);
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    function updateTraceStatus() {
        const tracePercent = Math.floor((mistakes / MAX_MISTAKES) * 100);
        traceBar.style.width = `${tracePercent}%`;
        traceText.innerText = `TRACE: ${tracePercent}%`;

        // 위험 수치 도달 시 붉은색 경고 디자인 적용
        if (mistakes >= 4) {
            statusPanel.classList.add('warning');
        }
    }

    // 3. 게임 오버 / 승리 처리
    function gameOver(isWin) {
        endScreen.style.display = "flex";
        if (isWin) {
            endTitle.innerText = "ACCESS GRANTED";
            endTitle.style.color = "#0f0";
            endDesc.innerText = `패스워드 [ ${targetWord} ] 해독 성공.\n방화벽을 무력화하고 탈출했습니다.`;
        } else {
            endTitle.innerText = "SYSTEM LOCKDOWN";
            endTitle.style.color = "#f00";
            endDesc.innerText = `보안 시스템에 의해 강제 종료되었습니다.\n정답 패스워드는 [ ${targetWord} ] 였습니다.`;
        }
    }

    // 4. 입력 처리 핵심 엔진
    function handleGuess() {
        const guess = letterInput.value.toUpperCase();
        letterInput.value = ""; // 입력창 비우기
        letterInput.focus();

        // 입력 유효성 검사 (A-Z 알파벳만 허용)
        if (!guess.match(/[A-Z]/)) {
            printLog("[WARN] 잘못된 입력입니다. 영문 알파벳만 입력하십시오.", true);
            return;
        }

        // 이미 시도한 글자인지 체크
        if (guessedLetters.includes(guess)) {
            printLog(`[WARN] '${guess}'는 이미 테스트한 데이터입니다.`, true);
            return;
        }

        // 장부에 시도한 글자 등록
        guessedLetters.push(guess);
        usedLettersText.innerText = guessedLetters.join(", ");

        // 정답에 포함되어 있는지 검증
        if (targetWord.includes(guess)) {
            printLog(`[SUCCESS] 데이터 '${guess}' 일치. 암호화 노드 해독 중...`);
        } else {
            mistakes++;
            printLog(`[DENIED] 데이터 '${guess}' 불일치. 보안 추적률이 상승합니다!`, true);
            updateTraceStatus();
        }

        // 화면 갱신 및 승패 체크
        const isWin = updateWordDisplay();

        if (isWin) {
            setTimeout(() => gameOver(true), 500);
        } else if (mistakes >= MAX_MISTAKES) {
            setTimeout(() => gameOver(false), 500);
        }
    }

    // 이벤트 리스너 연결
    btnSubmit.addEventListener('click', handleGuess);
    
    // 엔터키를 쳐도 입력되도록 편의성 추가
    letterInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleGuess();
    });

    // 초기화 실행
    updateWordDisplay();
    letterInput.focus();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도형의 3일 프로젝트: MUD 장비 제작소</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            width: 550px;
            background-color: #111;
            border: 2px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        .log-window {
            height: 300px;
            border: 1px solid #00ff00;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 20px;
            background-color: #050505;
            white-space: pre-line;
        }
        .status-bar {
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #00ff00;
            color: #000;
        }
        /* 특수 이펙트용 스타일 설정 */
        .special-alert {
            color: #ff00ff !important; /* 보라색/핑크색 강조 */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h2>[ ⚒️ MUD LEGENDARY FORGE v3.0 ]</h2>
    
    <div class="status-bar">
        <span>대장장이: Dohyong</span>
        <span id="gold-display">소지 골드: 1,000 G</span>
    </div>

    <div class="log-window" id="log-screen">
        모험에서 모은 재료로 무기를 제작할 수 있는 용광로 앞에 섰습니다.
        무기를 하나 제작하는 데 [100 골드]가 소모됩니다.
        아주 희박한 확률로 고대의 특수 옵션이 부여됩니다!
    </div>

    <div class="controls">
        <button id="btn-craft">🔨 무기 제작하기 (-100G)</button>
        <button id="btn-clear">🧹 로그 지우기</button>
    </div>
</div>

<script>
    const logScreen = document.getElementById('log-screen');
    const goldDisplay = document.getElementById('gold-display');

    let myGold = 1000;

    // 1. 기초 데이터 풀 정의
    const weaponTypes = ["도끼", "검", "망치", "창"];
    
    // 특수 옵션 장부 (확률 5% 미만 적용 타겟)
    const specialOptions = [
        { name: "흡혈의", effect: "공격 시 피해량의 10%만큼 체력 회복", priceMultiplier: 2.5 },
        { name: "용암의", effect: "적에게 지속 화염 피해 부가", priceMultiplier: 3.0 },
        { name: "서리한의", effect: "적의 이동 속도 50% 저하", priceMultiplier: 2.8 },
        { name: "신이 내린", effect: "모든 능력치 극대화 및 치명타율 +50%", priceMultiplier: 5.0 } // 초희귀
    ];

    function printLog(text, isSpecial = false) {
        if (isSpecial) {
            logScreen.innerHTML += `\n<span class="special-alert">${text}</span>`;
        } else {
            logScreen.innerText += "\n" + text;
        }
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    function updateGold() {
        goldDisplay.innerText = `소지 골드: ${myGold.toLocaleString()} G`;
    }

    // 2. 핵심 무기 제작 시스템 논리
    document.getElementById('btn-craft').addEventListener('click', () => {
        if (myGold < 100) {
            printLog("❌ 골드가 부족하여 무기를 제작할 수 없습니다! (제작비: 100G)");
            return;
        }

        // 제작비 차감
        myGold -= 100;
        updateGold();

        printLog(`\n--------------------------------------------------`);
        printLog("🔨 모루 위에 달궈진 철을 올리고 망치질을 시작합니다... 탁! 탁! 콰아아-");

        // [랜덤 1] 무기 종류 선택
        const randomType = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];

        // [랜덤 2] 공격력 설정 (기본 10 ~ 50)
        let attack = Math.floor(Math.random() * 41) + 10;
        
        // [랜덤 3] 내구성 설정 (기본 50 ~ 100)
        let durability = Math.floor(Math.random() * 51) + 50;

        // [기본 가치 계산] (공격력 * 5) + (내구성 * 2)
        let finalPrice = (attack * 5) + (durability * 2);

        // [핵심: 특수 옵션 확률 연산]
        let hasSpecial = false;
        let selectedOption = null;
        
        const roll = Math.random(); // 0.0이상 ~ 1.0미만의 소수점 무작위 수 생성

        if (roll < 0.05) { // 5% 확률 당첨
            hasSpecial = true;
            // 특수 옵션 중 하나를 무작위로 선택
            selectedOption = specialOptions[Math.floor(Math.random() * specialOptions.length)];
            
            // 특수 옵션 적용에 따른 능력치 버프 및 가격 뻥튀기
            attack = Math.floor(attack * 1.5);
            finalPrice = Math.floor(finalPrice * selectedOption.priceMultiplier);
        }

        // 3. 연출 및 결과 출력
        setTimeout(() => {
            if (hasSpecial) {
                // 연출용 문구 출력
                printLog("✨!!! 콰르릉! 뇌전이 대장간을 강타하며 기이한 기운이 깃듭니다 !!!✨", true);
                printLog(`🔮 [${selectedOption.name} ${randomType}] 이(가) 완성되었습니다!`, true);
                printLog(`▶ 특수 능력: [${selectedOption.effect}]`, true);
                printLog(`⚔️ 공격력: ${attack} (증폭됨) | 🛡️ 내구성: ${durability} | 💰 감정가: ${finalPrice.toLocaleString()} G`, true);
                
                // 대박 옵션이 뜨면 제작비를 회수하고도 남는 골드 보너스 부여 (판매 처리 가정)
                myGold += finalPrice;
                printLog(`💰 특수 장비를 상점에 즉시 처분하여 ${finalPrice} G를 획득했습니다!`);
                updateGold();
            } else {
                // 일반 제작 결과 출력
                printLog(`평범한 [${randomType}] 이(가) 완성되었습니다.`);
                printLog(`⚔️ 공격력: ${attack} | 🛡️ 내구성: ${durability} | 💰 감정가: ${finalPrice.toLocaleString()} G`);
                
                // 일반 템도 판매하여 골드 환산
                myGold += finalPrice;
                printLog(`💰 장비를 상점에 처분하여 ${finalPrice} G를 획득했습니다.`);
                updateGold();
            }
        }, 600); // 0.6초간의 망치질 딜레이 연출
    });

    // 로그 클리어 버튼
    document.getElementById('btn-clear').addEventListener('click', () => {
        logScreen.innerText = "용광로가 다시 조용해졌습니다.";
    });
</script>

</body>
</html>

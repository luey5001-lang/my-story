<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형의 프로젝트: NEON SLOT MACHINE</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }
        .machine-container {
            width: 700px;
            background-color: #1e1e24;
            border: 4px solid #f59e0b;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3), inset 0 0 20px #000;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            color: #fbbf24;
            font-size: 36px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #f59e0b, 0 0 20px #f59e0b;
        }
        
        /* 릴(Reel) 디자인 */
        .slot-reels {
            display: flex;
            justify-content: space-between;
            background-color: #000;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #333;
            margin-bottom: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .reel {
            width: 30%;
            height: 150px;
            background-color: #fff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            border: 5px solid #cbd5e1;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        /* 릴이 돌아갈 때 약간의 블러 효과 */
        .spinning {
            animation: shake 0.1s infinite;
            filter: blur(2px);
        }
        @keyframes shake {
            0% { transform: translateY(-5px); }
            50% { transform: translateY(5px); }
            100% { transform: translateY(-5px); }
        }

        /* 대시보드 및 컨트롤 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .dashboard div { display: flex; justify-content: space-between; }
        .gold-text { color: #fbbf24; font-weight: bold; }
        
        .bet-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn-bet {
            background-color: #3b82f6; color: white; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        .btn-bet:hover { background-color: #2563eb; }
        
        #btn-spin {
            width: 100%;
            background: linear-gradient(to bottom, #ef4444, #b91c1c);
            color: white;
            border: 2px solid #7f1d1d;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 5px 0 #7f1d1d, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        #btn-spin:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.5);
        }
        #btn-spin:disabled {
            background: #555; border-color: #333; box-shadow: none; color: #888; transform: translateY(5px); cursor: not-allowed;
        }

        /* 로그 창 */
        .log-window {
            height: 120px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 5px;
            margin-top: 20px;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            color: #aaa;
            white-space: pre-line;
        }
        .win-text { color: #34d399; font-weight: bold; font-size: 16px;}
        .jackpot-text { color: #fbbf24; font-weight: bold; font-size: 18px; text-shadow: 0 0 5px #fbbf24; }
        .lose-text { color: #ef4444; }
    </style>
</head>
<body>

<div class="machine-container">
    <div class="header">
        <h1>NEON JACKPOT</h1>
    </div>

    <!-- 3열 슬롯 릴 -->
    <div class="slot-reels">
        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍋</div>
        <div class="reel" id="reel3">🍉</div>
    </div>

    <!-- 자산 및 배팅 대시보드 -->
    <div class="dashboard">
        <div><span>💰 보유 자산:</span> <span class="gold-text" id="txt-gold">5,000 G</span></div>
        <div><span>🎯 현재 배팅:</span> <span class="gold-text" id="txt-bet">100 G</span></div>
    </div>

    <!-- 배팅 금액 조절 -->
    <div class="bet-controls">
        <button class="btn-bet" id="btn-bet-down">➖ 100 G</button>
        <span style="font-size: 20px; font-weight: bold;">BET SIZE</span>
        <button class="btn-bet" id="btn-bet-up">➕ 100 G</button>
    </div>

    <!-- 메인 스핀 버튼 -->
    <button id="btn-spin">🎰 PULL TO SPIN!</button>

    <!-- 게임 로그 -->
    <div class="log-window" id="log-screen">
[SYSTEM] 슬롯머신 부팅 완료. 배당표(Paytable):
- 7️⃣ 7️⃣ 7️⃣ : 배팅액 x 50 (JACKPOT!)
- 💎 💎 💎 : 배팅액 x 20
- 🔔 🔔 🔔 : 배팅액 x 10
- 과일 3개 동일 (🍉, 🍇, 🍋, 🍒) : 배팅액 x 5
- 🍒 🍒 (아무거나) : 배팅액 x 2
    </div>
</div>

<script>
    // 1. 심볼 데이터 및 확률 풀 (낮은 등급일수록 배열에 많이 넣어 출현 확률을 높임)
    const symbols = [
        "🍒", "🍒", "🍒", "🍒", 
        "🍋", "🍋", "🍋", 
        "🍉", "🍉", "🍉", 
        "🍇", "🍇", 
        "🔔", "🔔", 
        "💎", 
        "7️⃣" // 7은 단 1개만 넣어 극악의 확률 구성
    ];

    let gold = 5000;
    let currentBet = 100;
    let isSpinning = false;

    // DOM 요소
    const txtGold = document.getElementById('txt-gold');
    const txtBet = document.getElementById('txt-bet');
    const btnBetDown = document.getElementById('btn-bet-down');
    const btnBetUp = document.getElementById('btn-bet-up');
    const btnSpin = document.getElementById('btn-spin');
    const logScreen = document.getElementById('log-screen');
    const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

    function updateUI() {
        txtGold.innerText = `${gold.toLocaleString()} G`;
        txtBet.innerText = `${currentBet.toLocaleString()} G`;
    }

    function printLog(text) {
        logScreen.innerHTML += "\n" + text;
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    // 2. 배팅 금액 조절
    btnBetDown.addEventListener('click', () => {
        if (isSpinning) return;
        if (currentBet > 100) {
            currentBet -= 100;
            updateUI();
        }
    });

    btnBetUp.addEventListener('click', () => {
        if (isSpinning) return;
        if (currentBet + 100 <= gold) {
            currentBet += 100;
            updateUI();
        }
    });

    // 3. 무작위 심볼 뽑기 함수
    function getRandomSymbol() {
        return symbols[Math.floor(Math.random() * symbols.length)];
    }

    // 4. 슬롯 회전 및 당첨 연산 메인 엔진
    btnSpin.addEventListener('click', () => {
        if (isSpinning) return;
        if (gold < currentBet) {
            printLog("<span class='lose-text'>❌ 자금이 부족합니다. 배팅액을 낮춰주세요.</span>");
            return;
        }

        // 스핀 시작 처리
        isSpinning = true;
        gold -= currentBet;
        updateUI();
        btnSpin.disabled = true;
        printLog(`\n🎰 [SPIN] ${currentBet} G 배팅... 릴이 돌아갑니다!`);

        // 릴 애니메이션 효과 적용
        reels.forEach(reel => reel.classList.add('spinning'));

        // 각 릴마다 빠르게 글자가 바뀌는 시각 효과 (setInterval)
        const spinIntervals = [];
        for (let i = 0; i < 3; i++) {
            spinIntervals.push(setInterval(() => {
                reels[i].innerText = getRandomSymbol();
            }, 50)); // 0.05초마다 심볼 교체
        }

        // 최종 결과를 담을 배열
        const finalResults = [];

        // 릴 정지 타이머 (왼쪽부터 순차적으로 멈추는 극적 연출)
        const stopTimes = [1000, 1600, 2400]; // 1초, 1.6초, 2.4초 뒤 정지

        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                clearInterval(spinIntervals[i]); // 글자 바뀌는 애니메이션 중지
                reels[i].classList.remove('spinning'); // 블러 효과 제거
                
                // 최종 심볼 확정
                const finalSym = getRandomSymbol();
                reels[i].innerText = finalSym;
                finalResults[i] = finalSym;

                // 마지막 3번째 릴이 멈췄을 때 당첨금 계산
                if (i === 2) {
                    calculatePayout(finalResults);
                }
            }, stopTimes[i]);
        }
    });

    // 5. 배당금 판정 및 지급 로직
    function calculatePayout(res) {
        const [r1, r2, r3] = res;
        let payout = 0;
        let logMsg = "";

        if (r1 === "7️⃣" && r2 === "7️⃣" && r3 === "7️⃣") {
            payout = currentBet * 50;
            logMsg = `<span class='jackpot-text'>🎉 JACKPOT!!! 777 달성! ${payout.toLocaleString()} G 획득!</span>`;
        } 
        else if (r1 === "💎" && r2 === "💎" && r3 === "💎") {
            payout = currentBet * 20;
            logMsg = `<span class='win-text'>💎 다이아몬드 3연속! ${payout.toLocaleString()} G 획득!</span>`;
        }
        else if (r1 === "🔔" && r2 === "🔔" && r3 === "🔔") {
            payout = currentBet * 10;
            logMsg = `<span class='win-text'>🔔 종 3연속! ${payout.toLocaleString()} G 획득!</span>`;
        }
        else if (r1 === r2 && r2 === r3) {
            // 나머지 과일 3연속
            payout = currentBet * 5;
            logMsg = `<span class='win-text'>✨ ${r1} 3연속! ${payout.toLocaleString()} G 획득!</span>`;
        }
        else if ((r1 === "🍒" && r2 === "🍒") || (r2 === "🍒" && r3 === "🍒") || (r1 === "🍒" && r3 === "🍒")) {
            // 체리 2개
            payout = currentBet * 2;
            logMsg = `<span class='win-text'>🍒 체리 2개 적중! 본전 포함 ${payout.toLocaleString()} G 획득!</span>`;
        }
        else {
            // 꽝
            logMsg = `<span class='lose-text'>📉 꽝입니다. 칩을 잃었습니다.</span>`;
        }

        // 정산
        if (payout > 0) {
            gold += payout;
            updateUI();
        }

        printLog(logMsg);

        // 자산이 0이 되면 게임 오버 처리
        if (gold <= 0) {
            printLog("<span class='lose-text'>💀 파산했습니다. 모든 자산을 잃었습니다. 화면을 새로고침하세요.</span>");
        } else {
            // 다음 스핀 준비
            isSpinning = false;
            btnSpin.disabled = false;
            
            // 소지금이 배팅금보다 적어지면 배팅금을 강제로 소지금에 맞춤
            if (gold < currentBet) {
                currentBet = Math.floor(gold / 100) * 100;
                if(currentBet === 0) currentBet = gold; // 100단위 미만일 경우
                updateUI();
            }
        }
    }
</script>

</body>
</html>
